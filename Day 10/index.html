<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 10 - Login Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🔐 Login</h1>
    <input
        type="email"
        id="email"
        placeholder="Enter Email">
    <input
        type="password"
        id="password"
        placeholder="Enter Password">
    <button id="loginBtn">
        Login
    </button>
    <div id="message"></div>
</div>
<script src="script.js"></script>
</body>
</html>
